server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
      server:
        webmvc:
          routes:
            - id: expense-service
              uri: lb://EXPENSE-SERVICE
              predicates:
                - Path=/api/expenses/**
            - id: auth-service
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/api/auth/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/


# The Secret Vault for the Gateway
jwt:
  secret: ${JWT_SECRET}